<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>妊婦さん安心減塩レシピ＆買い物リスト</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6F61">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="クッキングリスト">
  <link rel="apple-touch-icon" href="icon.png">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="header-container">
      <div class="logo-area">
        <svg class="header-logo-svg" viewBox="0 0 24 24" width="28" height="28">
          <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.2 19.58 10.57 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm1-9h-2v3H8v2h3v3h2v-3h3v-2h-3V9z"/>
        </svg>
        <h1>クッキングリスト</h1>
      </div>
      <button id="btn-clear-all" class="btn-text-only" title="すべての選択をクリア">
        クリア
      </button>
    </div>
  </header>

  <!-- Main View Area -->
  <main class="app-main">
    
    <!-- Tab 1: Recipe List View -->
    <section id="view-recipes" class="app-view active">
      <div class="view-header-sticky">
        <div class="filter-bar">
          <button class="filter-chip active" data-filter="all">すべて</button>
          <button class="filter-chip" data-filter="電気圧力鍋">圧力鍋</button>
          <button class="filter-chip" data-filter="ノンフライヤー">ノンフライヤー</button>
          <button class="filter-chip" data-filter="レンジ">レンジ</button>
          <button class="filter-chip" data-filter="フライパン">フライパン</button>
        </div>
      </div>
      
      <div class="recipes-container" id="recipes-list">
        <!-- Dynamic recipe cards go here -->
      </div>
    </section>

    <!-- Tab 2: Shopping List View -->
    <section id="view-shopping" class="app-view">
      <div class="shopping-header">
        <div class="summary-card">
          <span class="summary-label">選択中のレシピ</span>
          <span class="summary-count" id="selected-recipes-count">0</span>
        </div>
        <div class="shopping-actions">
          <button id="btn-copy-list" class="btn-secondary">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
            コピー
          </button>
          <button id="btn-reset-checked" class="btn-outline">
            チェック解除
          </button>
        </div>
      </div>
      
      <div class="shopping-list-container">
        <div id="shopping-list-empty" class="empty-state">
          <div class="empty-icon">🛒</div>
          <h3>買い物リストは空です</h3>
          <p>「レシピ」タブから作りたい料理を選択してください。</p>
        </div>
        
        <ul id="shopping-list" class="shopping-list">
          <!-- Dynamic shopping list items go here -->
        </ul>
      </div>
    </section>

    <!-- Tab 3: Cooking Instructions View -->
    <section id="view-cooking" class="app-view">
      <div class="cooking-header-summary">
        <h2>本日つくる料理の手順</h2>
        <p class="subtitle">選んだレシピの作り方をまとめて確認できます</p>
      </div>

      <div id="cooking-list-empty" class="empty-state">
        <div class="empty-icon">🍳</div>
        <h3>選択されたレシピがありません</h3>
        <p>「レシピ」タブから料理を選択すると、ここに作り方が表示されます。</p>
      </div>

      <div class="cooking-recipes-container" id="cooking-recipes-list">
        <!-- Dynamic recipe details and steps go here -->
      </div>
    </section>

  </main>

  <!-- Bottom Navigation Bar -->
  <nav class="app-nav">
    <button class="nav-item active" data-tab="recipes">
      <svg viewBox="0 0 24 24" width="24" height="24">
        <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
        <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z" fill="currentColor"/>
      </svg>
      <span>レシピ</span>
    </button>
    <button class="nav-item" data-tab="shopping">
      <div class="nav-badge" id="nav-badge-count">0</div>
      <svg viewBox="0 0 24 24" width="24" height="24">
        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/>
      </svg>
      <span>買い物</span>
    </button>
    <button class="nav-item" data-tab="cooking">
      <svg viewBox="0 0 24 24" width="24" height="24">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" fill="currentColor"/>
      </svg>
      <span>作り方</span>
    </button>
  </nav>

  <!-- Recipe Details Modal (Optional, but great for deep-dive) -->
  <div id="recipe-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/>
        </svg>
      </button>
      <div class="modal-body" id="recipe-modal-body">
        <!-- Filled dynamically -->
      </div>
    </div>
  </div>

  <!-- External JS Resources -->
  <script src="recipes.js"></script>
  <script src="app.js"></script>
  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.error('Service Worker registration failed', err));
      });
    }
  </script>
</body>
</html>
